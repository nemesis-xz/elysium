<svg width="1200" height="627" viewBox="0 0 1200 627" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#121b33"/>
      <stop offset="100%" stop-color="#1a2750"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2a44" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0b1020" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="627" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.35">
    <rect x="0" y="0" width="1200" height="627" fill="url(#grid)"/>
    <g stroke="#223056" stroke-width="1">
      <path d="M0 104H1200"/>
      <path d="M0 208H1200"/>
      <path d="M0 312H1200"/>
      <path d="M0 416H1200"/>
      <path d="M0 520H1200"/>
      <path d="M120 0V627"/>
      <path d="M240 0V627"/>
      <path d="M360 0V627"/>
      <path d="M480 0V627"/>
      <path d="M600 0V627"/>
      <path d="M720 0V627"/>
      <path d="M840 0V627"/>
      <path d="M960 0V627"/>
      <path d="M1080 0V627"/>
    </g>
  </g>

  <!-- Accent orbits -->
  <circle cx="920" cy="160" r="140" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="2"/>
  <circle cx="920" cy="160" r="210" stroke="#f97316" stroke-opacity="0.18" stroke-width="2"/>
  <circle cx="920" cy="160" r="280" stroke="#f97316" stroke-opacity="0.12" stroke-width="2"/>

  <!-- Abstract node cluster -->
  <g fill="#8ab4ff" opacity="0.85">
    <circle cx="860" cy="250" r="5"/>
    <circle cx="920" cy="230" r="6"/>
    <circle cx="980" cy="260" r="4"/>
    <circle cx="1040" cy="220" r="5"/>
    <circle cx="1020" cy="310" r="4"/>
    <circle cx="900" cy="320" r="5"/>
  </g>
  <g stroke="#8ab4ff" stroke-opacity="0.5" stroke-width="2">
    <path d="M860 250L920 230L980 260L1040 220"/>
    <path d="M980 260L1020 310L900 320L860 250"/>
  </g>

  <!-- Badge -->
  <g>
    <rect x="80" y="120" width="230" height="36" rx="18" fill="rgba(245,158,11,0.15)" stroke="url(#accent)" stroke-opacity="0.6"/>
    <text x="196" y="144" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#fcd34d">Web Pentesting Lab</text>
  </g>

  <!-- Title -->
  <text x="80" y="240" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800" fill="#e5e7eb">Elysium Lab</text>
  <text x="80" y="292" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500" fill="#9ca3af">Realistic corporate environment for authorized security training</text>

  <!-- Feature list -->
  <g font-family="Inter, Arial, sans-serif" font-size="18" fill="#cbd5f5">
    <text x="80" y="360">10 subdomains • mixed stack • 15 intentional vulnerabilities</text>
    <text x="80" y="395">Web‑only scope • no flags • reproducible writeups</text>
  </g>

  <!-- Footer line -->
  <rect x="80" y="460" width="380" height="2" fill="url(#accent)"/>
  <text x="80" y="505" font-family="Inter, Arial, sans-serif" font-size="14" fill="#94a3b8">elysium.futr • isolated lab environment</text>
